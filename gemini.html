<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Plan Selection</title>
    <style>
        :root {
            --primary: #ff7eb3;
            --secondary: #ff758c;
            --bg: #fffafa;
            --text-color: #5d5d5d;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* タップ時の青い枠を消す */
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* スクロールを禁止してアプリ感を出す */
        }

        h1 { 
            color: #d63384; 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            text-align: center; 
            line-height: 1.6;
        }
        
        /* カードのコンテナ */
        .card-container {
            display: flex;
            gap: 10px;
            perspective: 1000px;
            width: 100%;
            justify-content: center;
        }

        /* カードのスタイル（スマホ向けに少しスリムに） */
        .card {
            width: 28%;
            max-width: 90px;
            aspect-ratio: 2 / 3;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            transform-style: preserve-3d;
        }

        /* めくられた時のアニメーション */
        .card.flipped { transform: rotateY(180deg) scale(1.1); z-index: 10; }
        .card.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }

        /* 結果表示エリア */
        #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 250, 250, 0.98);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 100;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .plan-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 30px rgba(255, 126, 179, 0.2);
            width: 100%;
            max-width: 320px;
        }

        .plan-title { 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #ff4d7d; 
            margin-bottom: 15px; 
        }

        .plan-text { 
            text-align: left; 
            line-height: 1.7; 
            color: var(--text-color); 
            font-size: 0.95rem;
        }
        
        .btn-retry {
            margin-top: 25px;
            background: #f0f0f0;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-view">
        <h1>どれにする？<br>好きなカードをえらんでね ✨</h1>
        <div class="card-container">
            <div class="card" onclick="openCard(0)">🎁</div>
            <div class="card" onclick="openCard(1)">🎂</div>
            <div class="card" onclick="openCard(2)">🥂</div>
        </div>
    </div>

    <div id="result-overlay">
        <div class="plan-box">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">✨</div>
            <div id="selected-title" class="plan-title"></div>
            <div id="selected-detail" class="plan-text"></div>
            <button class="btn-retry" onclick="reset()">選び直す？</button>
        </div>
    </div>

<script>
    const plans = [
        {
            title: "Plan A：王道お祝いコース",
            detail: "・おしゃれなエリアでお買い物<br>・夜景の見える特等席でディナー<br>・デザートプレートでお祝い！"
        },
        {
            title: "Plan B：まったり癒やしコース",
            detail: "・個室スパやマッサージでリラックス<br>・落ち着いた隠れ家カフェ巡り<br>・お家やホテルで豪華テイクアウト"
        },
        {
            title: "Plan C：思い出体験コース",
            detail: "・二人でペアリングや陶芸作り<br>・記念撮影スポットをぶらり散策<br>・カジュアルでおいしいお店で乾杯！"
        }
    ];

    let isProcessing = false;

    function openCard(index) {
        if (isProcessing) return;
        isProcessing = true;

        const cards = document.querySelectorAll('.card');
        cards.forEach((card, i) => {
            if(i === index) {
                card.classList.add('flipped');
            } else {
                card.classList.add('hidden');
            }
        });

        setTimeout(() => {
            document.getElementById('selected-title').innerText = plans[index].title;
            document.getElementById('selected-detail').innerHTML = plans[index].detail;
            document.getElementById('result-overlay').style.display = 'flex';
        }, 700);
    }

    function reset() {
        location.reload();
    }
</script>

</body>
</html>
