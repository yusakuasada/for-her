<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Plan Selection</title>
    <style>
        :root {
            --primary: #ff7eb3;
            --secondary: #ff758c;
            --bg: #fffafa;
        }
        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        h1 { color: #d63384; font-size: 1.4rem; margin-bottom: 30px; text-align: center; }
        
        /* カードのコンテナ */
        .card-container {
            display: flex;
            gap: 15px;
            perspective: 1000px;
        }

        /* カードのスタイル */
        .card {
            width: 100px;
            height: 150px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }

        .card:hover { transform: translateY(-10px); }

        /* めくられた時のアニメーション */
        .card.flipped { transform: rotateY(180deg) scale(1.2); z-index: 10; }
        .card.hidden { opacity: 0; transform: scale(0.5); pointer-events: none; }

        /* 結果表示エリア */
        #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 100;
            animation: fadeIn 0.5s forwards;
        }

        .plan-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--primary);
            box-shadow: 0 15px 35px rgba(255, 126, 179, 0.3);
            max-width: 400px;
        }

        .plan-title { font-size: 1.5rem; font-weight: bold; color: #ff4d7d; margin-bottom: 15px; }
        .plan-text { text-align: left; line-height: 1.8; color: #555; }
        
        .btn-retry {
            margin-top: 25px;
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-view">
        <h1>どれにする？<br>好きなカードをタップしてね ✨</h1>
        <div class="card-container">
            <div class="card" onclick="openCard(0)">🎁</div>
            <div class="card" onclick="openCard(1)">🎂</div>
            <div class="card" onclick="openCard(2)">🥂</div>
        </div>
    </div>

    <div id="result-overlay">
        <div class="plan-box">
            <div style="font-size: 3rem; margin-bottom: 10px;">✨</div>
            <div id="selected-title" class="plan-title"></div>
            <div id="selected-detail" class="plan-text"></div>
            <button class="btn-retry" onclick="reset()">選び直す？</button>
        </div>
    </div>

<script>
    const plans = [
        {
            title: "Plan A：王道お祝いコース",
            detail: "・おしゃれなエリアでお買い物<br>・夜景の見える特等席でディナー<br>・デザートプレートでお祝い！"
        },
        {
            title: "Plan B：まったり癒やしコース",
            detail: "・個室スパやマッサージでリラックス<br>・落ち着いた隠れ家カフェ巡り<br>・お家やホテルで豪華テイクアウト"
        },
        {
            title: "Plan C：思い出体験コース",
            detail: "・二人でペアリングや陶芸作り<br>・記念撮影スポットをぶらり散策<br>・カジュアルでおいしいお店で乾杯！"
        }
    ];

    function openCard(index) {
        // 全カードにエフェクトをかける
        const cards = document.querySelectorAll('.card');
        cards.forEach((card, i) => {
            if(i === index) {
                card.classList.add('flipped');
            } else {
                card.classList.add('hidden');
            }
        });

        // 少し遅れて結果を表示
        setTimeout(() => {
            document.getElementById('selected-title').innerText = plans[index].title;
            document.getElementById('selected-detail').innerHTML = plans[index].detail;
            document.getElementById('result-overlay').style.display = 'flex';
        }, 800);
    }

    function reset() {
        location.reload();
    }
</script>

</body>
</html>
