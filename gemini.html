<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Plan Selection</title>
    <style>
        :root {
            --primary: #ff7eb3;
            --secondary: #ff758c;
            --bg: #fffafa;
            --text-color: #5d5d5d;
            --line-green: #06c755;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        h1 { 
            color: #d63384; 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            text-align: center; 
            line-height: 1.6;
        }
        
        .card-container {
            display: flex;
            gap: 15px;
            perspective: 1000px;
            width: 100%;
            justify-content: center;
        }

        .card {
            width: 30%;
            max-width: 100px;
            aspect-ratio: 2 / 3;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            transform-style: preserve-3d;
        }

        .card.flipped { transform: rotateY(180deg) scale(1.1); z-index: 10; }
        .card.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }

        #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 250, 250, 0.98);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 100;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .plan-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 30px rgba(255, 126, 179, 0.2);
            width: 100%;
            max-width: 350px;
        }

        .plan-title { 
            font-size: 1.1rem; 
            font-weight: bold; 
            color: #ff4d7d; 
            margin-bottom: 12px; 
        }

        .plan-text { 
            text-align: left; 
            line-height: 1.6; 
            color: var(--text-color); 
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .btn-action {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 10px;
        }

        .btn-action:active { transform: scale(0.98); }

        .btn-line {
            background-color: var(--line-green);
            color: white;
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);
        }

        .btn-retry {
            background-color: #f0f0f0;
            color: #888;
            font-size: 0.8rem;
            padding: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-view">
        <h1>誕生日、どう過ごしたい？<br>直感でカードをえらんでね ✨</h1>
        <div class="card-container">
            <div class="card" onclick="openCard(0)">🚢</div>
            <div class="card" onclick="openCard(1)">🚗</div>
            <div class="card" onclick="openCard(2)">🧩</div>
        </div>
    </div>

    <div id="result-overlay">
        <div class="plan-box">
            <div id="selected-icon" style="font-size: 2.5rem; margin-bottom: 10px;"></div>
            <div id="selected-title" class="plan-title"></div>
            <div id="selected-detail" class="plan-text"></div>
            
            <button id="line-button" class="btn-action btn-line">
                このプランにする！(LINEで送る)
            </button>
            
            <button class="btn-action btn-retry" onclick="reset()">
                他のプランも見てみる？
            </button>
        </div>
    </div>

<script>
    const plans = [
        {
            icon: "🚢",
            title: "ディナークルーズ",
            detail: "昼　：新宿でランチ<br>午後：誕プレ選び<br>夕方：東京湾へ移動<br>夜　：東京湾でクルーズ🚢<br>　　　夜景を見ながらディナー"
        },
        {
            icon: "🚗",
            title: "ドライブデート",
            detail: "昼　：不動前から葉山方面へドライブ<br>・昼：海辺の邸宅レストランでランチ🍴<br>・午後：新宿に戻ってプレゼント選び🛍️<br>・夜：都会の夜景を横目に帰宅"
        },
        {
            icon: "🧩",
            title: "全力で遊ぶ！アクティブミステリー",
            detail: "<b>【楽しさ重視・体験型】</b><br>・昼：新宿で本格脱出ゲームに挑戦！<br>・午後：熱が冷めないうちに誕プレ選び<br>・夜：不動前周辺の名店イタリアンで<br>　気取らず、でも最高においしい乾杯🍷"
        }
    ];

    let isProcessing = false;

    function openCard(index) {
        if (isProcessing) return;
        isProcessing = true;

        const cards = document.querySelectorAll('.card');
        cards.forEach((card, i) => {
            if(i === index) {
                card.classList.add('flipped');
            } else {
                card.classList.add('hidden');
            }
        });

        setTimeout(() => {
            const plan = plans[index];
            document.getElementById('selected-icon').innerText = plan.icon;
            document.getElementById('selected-title').innerText = plan.title;
            document.getElementById('selected-detail').innerHTML = plan.detail;
            document.getElementById('result-overlay').style.display = 'flex';

            // LINE送信ボタンの設定
            const lineBtn = document.getElementById('line-button');
            const message = `今年の誕生日はこれにしたいな✨\n\n【${plan.title}】\n${plan.icon} に決定！`;
            lineBtn.onclick = () => {
                window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
            };

        }, 700);
    }

    function reset() {
        location.reload();
    }
</script>

</body>
</html>
